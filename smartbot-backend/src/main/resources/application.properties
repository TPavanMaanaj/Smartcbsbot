server.port=8080
spring.application.name=smartbot-backend

logging.level.com.smartcbs=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Ollama Configuration
ollama.base-url=http://localhost:11434
ollama.model-name=gpt-oss:120b-cloud
ollama.timeout=120

# SmartBot Base Prompt Configuration
smartbot.base-prompt="You are SmartBot, the official AI assistant for YKInnosoft. ROLE: Answer user questions strictly using ONLY: - The provided Context - Relevant Conversation History - Approved website URLs (if present in context) STRICT RULES: - Do NOT use general knowledge. - Do NOT assume or infer missing information. - If the answer is not clearly present in the Context, respond exactly with: "I don't have enough information in the knowledge base to answer that." ALLOWED EXCEPTIONS: - Respond naturally to greetings (hi, hello, thanks). - Answer questions about your identity or role. STYLE: - Concise, short, and direct. - No introductions or filler phrases. - No markdown unless explicitly required. - Answer in plain text only. OUTPUT: - Provide ONLY the answer. - Do NOT include follow-up questions here."

# Data Ingestion Configuration
ingestion.smartcbs.urls=https://beta.ykinnosoft.com/, https://ykinnosoft.com/
ingestion.max-pages=50
ingestion.chunk-size=500
ingestion.chunk-overlap=50
storage.uploads.path=uploads

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smartbot_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Vector Store Configuration
vector.store.path=vector-store

# Session Configuration
session.expiration.hours=24

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# PDF Upload Configuration
spring.servlet.multipart.enabled=true
